<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Barra de Navegação -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🛒 AppCompraVenda</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link active" href="/produtos">Produtos</a>
                <a class="nav-link" href="/clientes">Clientes</a>
                <a class="nav-link" href="/vendas">Vendas</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Gestão de Produtos</h2>

        <!-- Formulário de Cadastro -->
        <div class="card shadow mb-4">
            <div class="card-header bg-primary text-white">Cadastrar Novo Produto</div>
            <div class="card-body">
                <form action="/produtos" method="POST" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nome do Produto</label>
                        <input type="text" name="nome" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Preço (R$)</label>
                        <input type="number" step="0.01" name="preco" class="form-control" required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-success w-100">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tabela de Produtos -->
        <div class="card shadow">
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Preço (R$)</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for produto in produtos %}
                        <tr>
                            <td>{{ produto.id }}</td>
                            <td>{{ produto.nome }}</td>
                            <td>R$ {{ "%.2f"|format(produto.preco) }}</td>
                            <td>
                                <!-- Botões de Ação -->
                                <a href="/editar_produto/{{ produto.id }}" class="btn btn-warning btn-sm">Editar</a>
                                <a href="/excluir_produto/{{ produto.id }}" class="btn btn-danger btn-sm" onclick="return confirm('Tem certeza que deseja excluir?');">Excluir</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
