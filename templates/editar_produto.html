<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Barra de Navegação -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🛒 AppCompraVenda</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link active" href="/produtos">Produtos</a>
                <a class="nav-link" href="/clientes">Clientes</a>
                <a class="nav-link" href="/vendas">Vendas</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Editar Produto</h2>

        <div class="card shadow mb-4">
            <div class="card-header bg-warning text-dark">Atualizar Dados do Produto</div>
            <div class="card-body">
                <!-- O action aponta para a rota de edição com o ID do produto -->
                <form action="/editar_produto/{{ produto.id }}" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label">Nome do Produto</label>
                        <!-- O value preenche a caixinha com o nome atual -->
                        <input type="text" name="nome" class="form-control" value="{{ produto.nome }}" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Preço (R$)</label>
                            <!-- O value preenche a caixinha com o preço atual -->
                            <input type="number" step="0.01" name="preco" class="form-control" value="{{ produto.preco }}" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Estoque</label>
                            <!-- O value preenche a caixinha com o estoque atual -->
                            <input type="number" name="estoque" class="form-control" value="{{ produto.estoque }}" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-3">
                        <a href="/produtos" class="btn btn-secondary">Cancelar e Voltar</a>
                        <button type="submit" class="btn btn-success">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
