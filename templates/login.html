<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AppCompraVenda</title>
    <!-- Bootstrap e Fontes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            background: linear-gradient(90deg, #f53d2d, #ff6633);
            color: white;
            text-align: center;
            padding: 30px 20px;
        }
        .login-body {
            padding: 30px;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px;
            background-color: #f8f9fa;
        }
        .form-control:focus {
            border-color: #f53d2d;
            box-shadow: 0 0 0 0.25rem rgba(245, 61, 45, 0.25);
            background-color: white;
        }
        .btn-primary {
            background-color: #f53d2d !important;
            border-color: #f53d2d !important;
            border-radius: 8px;
            font-weight: 600;
            padding: 12px;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: #d73222 !important;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h2 class="mb-0 fw-bold"><i class="bi bi-cart4 me-2"></i>AppCompraVenda</h2>
            <p class="mb-0 mt-2 text-white-50">Acesse o sistema</p>
        </div>
        
        <div class="login-body">
            <!-- Mensagem de erro caso a senha esteja errada -->
            {% if erro %}
            <div class="alert alert-danger text-center shadow-sm" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ erro }}
            </div>
            {% endif %}

            <form action="/login" method="POST">
                
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">E-mail de Acesso</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <!-- AQUI ESTÁ O SEGREDO: name="email" -->
                        <input type="email" name="email" class="form-control border-start-0" placeholder="exemplo@loja.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <!-- AQUI: name="password" -->
                        <input type="password" name="password" class="form-control border-start-0" placeholder="******" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 shadow-sm">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
                </button>
            </form>
        </div>
    </div>

</body>
</html>
